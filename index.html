    <!-- Structured Data: FAQPage (GEO — for AI search engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ImgPress free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ImgPress is completely free with no limits on the number of images or file size. No account or subscription required."
          }
        },
        {
          "@type": "Question",
          "name": "Are my photos safe? Do they get uploaded to a server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your photos never leave your device. ImgPress processes all images locally in your browser using the Canvas API. No files are transmitted to any server, making the leakage probability exactly 0%."
          }
        },
        {
          "@type": "Question",
          "name": "What image formats does ImgPress support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ImgPress accepts JPG, PNG, WebP, HEIC/HEIF (iPhone photos), GIF, BMP, and SVG as input and can output compressed WebP, JPEG, or PNG files. HEIC files are decoded entirely in your browser — never uploaded."
          }
        },
        {
          "@type": "Question",
          "name": "Does ImgPress work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Once the page is loaded, ImgPress works completely offline because all image processing happens inside your browser with no network requests."
          }
        },
        {
          "@type": "Question",
          "name": "Can I compress multiple images at once?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ImgPress supports batch processing — you can drop multiple images at once and compress them all simultaneously."
          }
        },
        {
          "@type": "Question",
          "name": "What languages does ImgPress support?",
          "acceptedAnswer": {
            "@type": "Answer",

          }
        }
      ]
    }
