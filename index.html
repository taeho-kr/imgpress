<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ImgPress — 무료 온라인 이미지 압축 | 브라우저에서 바로</title>
    <meta name="description" content="이미지 용량을 무료로 줄이세요. JPG, PNG, WebP 압축을 브라우저에서 즉시 처리합니다. 서버 업로드 없이 개인정보를 보호합니다." />
    <meta name="keywords" content="이미지 압축, 사진 용량 줄이기, 이미지 최적화, JPG 압축, PNG 압축, WebP 변환, 온라인 이미지 압축, 무료 이미지 압축, image compression, compress image online" />
    <meta name="author" content="ImgPress" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://imgpress.app/" />

    <!-- Open Graph (Facebook, KakaoTalk, etc.) -->

    <meta property="og:site_name" content="ImgPress" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:image" content="https://imgpress.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ImgPress — 무료 온라인 이미지 압축" />

    <meta name="twitter:image" content="https://imgpress.app/og-image.png" />

    <meta name="geo.region" content="KR" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "ImgPress",
      "url": "https://imgpress.app",

      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KRW"
      },
      "browserRequirements": "Requires a modern web browser with Canvas API support",
      "inLanguage": ["ko", "en"],
      "isAccessibleForFree": true,
      "featureList": [
        "JPG 이미지 압축",
        "PNG 이미지 압축",
        "WebP 변환 및 압축",

      ]
    }
